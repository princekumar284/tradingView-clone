version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: trading-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: trading-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
